name: Create MCWorld and Notify

on:
  push:
    branches:
      - main
    paths:
      - 'worlds/CPKWorld/**'

# Node.js 24 を強制使用する設定（警告対策）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip tool
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Check Directory and Create MCWorld
        run: |
          # フォルダが存在するか確認
          if [ ! -d "worlds/CPKWorld" ]; then
            echo "Error: worlds/CPKWorld directory not found!"
            exit 1
          fi
          
          # zip作成（-j オプションで余計な階層を含めないようにします）
          # worlds/CPKWorld の中身を CPKWorld.mcworld という名前で圧縮
          cd worlds/CPKWorld
          zip -r ../../CPKWorld.mcworld .
          cd ../../

# (前略: Checkout, Install zip, Create MCWorld までは同じ)

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: CPKWorld.mcworld
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            # リリースURLを含めて通知
            URL="https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}"
            CONTENT="✅ **配布用データ作成完了！**\nダウンロードはこちら: $URL"
          else
            CONTENT="❌ **ワークフロー失敗** ログを確認してください。"
          fi
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$CONTENT\"}" \
               $DISCORD_WEBHOOK
